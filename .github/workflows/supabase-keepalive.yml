name: Supabase Keepalive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      KEEPALIVE_TABLE: Account
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_URL}" || { echo "Missing secret: SUPABASE_URL"; exit 1; }
          test -n "${SUPABASE_SERVICE_ROLE_KEY}" || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }

      - name: Ping Supabase REST API
        shell: bash
        run: |
          set -euo pipefail

          endpoint="${SUPABASE_URL%/}/rest/v1/${KEEPALIVE_TABLE}?select=id&limit=1"

          status_code=$(curl \
            --silent \
            --show-error \
            --output /tmp/supabase-keepalive-response.json \
            --write-out "%{http_code}" \
            --request GET \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Accept: application/json" \
            "${endpoint}")

          cat /tmp/supabase-keepalive-response.json

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Supabase keepalive failed with HTTP ${status_code}"
            exit 1
          fi

          echo "Supabase keepalive OK (${status_code})"
